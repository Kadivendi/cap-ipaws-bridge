worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream backend_api {
        # docker compose service name for the FastAPI backend
        server backend:8000;
    }

    server {
        listen      80;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # Health probe used by docker compose / Kubernetes.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # Proxy API and websocket traffic to the FastAPI backend so the
        # dashboard / composer can talk to it without a separate CORS hop.
        location ^~ /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # /composer + /dashboard + every other client-side route map onto
        # the React SPA. `try_files` falls back to index.html so a full-page
        # reload on /composer/foo still works.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

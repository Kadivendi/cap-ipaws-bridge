# Compose Spec (modern compose.yaml). docker-compose.yml is preserved for legacy tooling.
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      IPAWS_CERT_PATH: /certs/fema.p12
      IPAWS_ENDPOINT: https://apps.fema.gov/IPAWSOPEN_EAS_SERVICE/rest
      IPAWS_SANDBOX: "true"
      MESH_GATEWAY_URL: http://resilient-mesh-gateway:8090
      MESH_GATEWAY_API_KEY: ${MESH_GATEWAY_API_KEY:-}
      RAPID_ALERT_URL: http://rapid-alert-platform:8080
      RAPID_ALERT_CLIENT_ID: ${RAPID_ALERT_CLIENT_ID:-}
      RAPID_ALERT_CLIENT_SECRET: ${RAPID_ALERT_CLIENT_SECRET:-}
    volumes:
      - ./certs:/certs:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
